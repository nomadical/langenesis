name: validate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  # Opt into Node.js 24 for v4 JavaScript actions ahead of the June 2026
  # deprecation. See https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Data + schema tests
        run: npm test

      - name: Production build
        run: npm run build
