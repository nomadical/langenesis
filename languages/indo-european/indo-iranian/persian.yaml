  New Persian (Fārsi). Covers Early New Persian (9th–13th c., language of
  Ferdowsi's Shahnameh and Rumi) and Modern Persian. Three modern standards:
  Iranian Persian (Farsi), Afghan Persian (Dari), Tajik Persian (Tajiki).
