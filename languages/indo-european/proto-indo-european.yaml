notes: |
  Reconstructed common ancestor of the Indo-European family. Dating is contested:
  Kurgan hypothesis places it ~4500–2500 BCE on the Pontic-Caspian steppe; the
  Anatolian hypothesis pushes it earlier (~7000 BCE) into Anatolia.
