id: proto-semitic
name: Proto-Semitic
parents: [proto-afro-asiatic]
period:
  start: -4000
  end: -2500
  start_uncertainty: 500
status: reconstructed
sources:
  - https://en.wikipedia.org/wiki/Proto-Semitic_language
notes: |
  Reconstructed ancestor of the Semitic branch — East Semitic (Akkadian) and
  West Semitic (Aramaic, Hebrew, Arabic, Ethiopic, etc.). Likely originated in
  the Levant or Arabian peninsula.
