id: proto-bantu
name: Proto-Bantu
parents: [proto-niger-congo]
period:
  start: -3000
  end: -1000
  start_uncertainty: 500
status: reconstructed
sources:
  - https://en.wikipedia.org/wiki/Proto-Bantu_language
notes: |
  Reconstructed ancestor of the Bantu sub-branch (~500 languages spoken across
  Central, Eastern, and Southern Africa). The Bantu expansion from a homeland
  in the Cameroon–Nigeria border region began ~3000 BCE.
